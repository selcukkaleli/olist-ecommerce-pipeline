version: 2
 
models:
 # ────────────────────────────────────────────
  # MARTS
  # ────────────────────────────────────────────

  - name: marts_seller_monthly_metrics
    description: >
      Dashboard-ready monthly metrics per seller. Built on top of int_seller_monthly_metrics.
      Each row represents one seller in one calendar month.
      Granularity: seller_id + order_month.
    columns:
      - name: seller_id
        description: Unique identifier of the seller.
        tests:
          - not_null

      - name: total_item_sold
        description: Total number of order items sold by this seller in the given month.
        tests:
          - not_null

      - name: avg_freight_value
        description: Average freight (shipping) value charged per item for this seller in the given month.

      - name: total_revenue
        description: Total revenue generated by this seller in the given month, calculated as the sum of item prices.
        tests:
          - not_null

      - name: avg_approving_time
        description: Average number of days between order purchase and order approval for this seller's orders in the given month.

      - name: avg_delivery_delay
        description: >
          Average number of days between actual delivery date and estimated delivery date.
          Negative values indicate early delivery (good performance).
          Positive values indicate late delivery (poor performance).

      - name: avg_review_score
        description: >
          Average customer review score (1–5) for orders delivered by this seller in the given month.
          May be null if no reviews were submitted for the period.

      - name: order_month
        description: Calendar month of the orders as a DATE type (e.g. 2018-01-01).
        tests:
          - not_null

  - name: marts_category_monthly_metrics
    description: >
      Dashboard-ready monthly metrics per product category. Built on top of int_category_monthly_metrics.
      Each row represents one product category in one calendar month.
      Granularity: product_category_name_english + order_month.
    columns:
      - name: product_category_name_english
        description: English name of the product category.
        tests:
          - not_null

      - name: total_item_sold
        description: Total number of order items sold in this category in the given month.
        tests:
          - not_null

      - name: avg_freight_value
        description: Average freight (shipping) value charged per item in this category in the given month.

      - name: total_revenue
        description: Total revenue generated in this category in the given month, calculated as the sum of item prices.
        tests:
          - not_null

      - name: avg_approving_time
        description: Average number of days between order purchase and order approval for orders in this category in the given month.

      - name: avg_delivery_delay
        description: >
          Average number of days between actual delivery date and estimated delivery date for this category.
          Negative values indicate early delivery (good performance).
          Positive values indicate late delivery (poor performance).

      - name: avg_review_score
        description: >
          Average customer review score (1–5) for orders in this category in the given month.
          May be null if no reviews were submitted for the period.

      - name: order_month
        description: Calendar month of the orders as a DATE type (e.g. 2018-01-01).
        tests:
          - not_null