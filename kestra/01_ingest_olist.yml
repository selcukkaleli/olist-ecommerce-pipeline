id: ingest_olist
namespace: olist.pipeline

description: "Download Brazilian E-Commerce Public Dataset by Olist"

tasks:
  - id: working-dir
    type: io.kestra.plugin.core.flow.WorkingDirectory
    tasks:
      - id: download
        type: io.kestra.plugin.scripts.python.Script
        dependencies:
          - kaggle==2.0.1
          - requests
          - kestra
        script: |
          import os

          os.environ['KAGGLE_USERNAME'] = '{{kv("KAGGLE_USERNAME")}}'
          os.environ['KAGGLE_KEY'] = '{{kv("KAGGLE_KEY")}}'

          import kaggle

          kaggle.api.authenticate()
          kaggle.api.dataset_download_files('olistbr/brazilian-ecommerce', path='.', unzip=True)

      - id: upload
        type: io.kestra.plugin.scripts.shell.Commands
        containerImage: google/cloud-sdk:slim
        commands:
          - printf '%s' '{{kv("GCP_CREDS")}}' > /tmp/gcp-key.json
          - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          - gsutil cp *.csv gs://olist-ecommerce-pipeline-id-data-lake/raw/olist/
          - echo "Upload complete"
